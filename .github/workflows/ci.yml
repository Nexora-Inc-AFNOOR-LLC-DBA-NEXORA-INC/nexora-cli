name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722034518b906
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage check (≥60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,""); print $3}')
          echo "Coverage: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 60) { print "Coverage " cov "% is below 60%"; exit 1 } }'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722034518b906
        with:
          go-version: "1.22"
          cache: true

      - uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8
        with:
          version: v1.57.2

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722034518b906
        with:
          go-version: "1.22"
          cache: true

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.19.0
          gosec ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
