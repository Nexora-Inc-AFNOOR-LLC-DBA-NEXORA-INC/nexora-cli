run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  gosec:
    excludes:
      - G304
  revive:
    rules:
      - name: exported
        severity: warning
  goimports:
    local-prefixes: github.com/Nexora-Inc-AFNOOR-LLC-DBA-NEXORA-INC/nexora-cli

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
